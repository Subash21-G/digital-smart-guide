<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Digital Smart Guide</title>

  <script>const pathSegmentsToKeep = 1;

      const locationPath = window.location.pathname
        .split('/')
        .slice(0, 1 + pathSegmentsToKeep)
        .join('/');

      const redirectPath =
        window.location.protocol +
        '//' +
        window.location.hostname +
        locationPath +
        '/?/' +
        window.location.pathname
          .slice(1)
          .split('/')
          .slice(pathSegmentsToKeep)
          .join('/')
          .replace(/&/g, '~and~') +
        (window.location.search ? '&' + window.location.search.slice(1).replace(/&/g, '~and~') : '') +
        window.location.hash;

      window.location.replace(redirectPath);</script>
</head>

<body>
  Redirecting...
</body>
</html>

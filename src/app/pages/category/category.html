<section class="category-page">
  <div class="container">
    <a routerLink="/" class="back-link">← Back to Home</a>

    <h1>{{ categoryName }} Guides</h1>
    <p class="intro">
      Useful articles, comparisons and awareness guides under {{ categoryName }}.
    </p>

    <div class="article-grid" *ngIf="articles.length > 0; else noArticles">
      <article class="article-card" *ngFor="let article of articles">
        <span>{{ article.category }}</span>
        <h3>{{ article.title }}</h3>
        <p>{{ article.description }}</p>
        <a [routerLink]="['/article', article.slug]">Read Guide</a>
      </article>
    </div>

    <ng-template #noArticles>
      <div class="empty">
        <h3>No articles found</h3>
        <p>Articles for this category will be added soon.</p>
      </div>
    </ng-template>
  </div>
</section>

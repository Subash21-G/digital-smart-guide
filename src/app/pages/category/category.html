<section class="category-page">
  <div class="container">

    <div class="category-header">
      <p>Digital Smart Guide</p>
      <h1>{{ categoryTitle }} Guides</h1>
      <span>
        Useful comparison guides and beginner-friendly information.
      </span>
    </div>

    <div class="article-grid" *ngIf="articles.length > 0; else noArticles">
      <a class="article-card"
         *ngFor="let article of articles"
         [routerLink]="['/article', article.slug]">

        <span class="badge">{{ article.category }}</span>
        <h2>{{ article.title }}</h2>
        <p>{{ article.description }}</p>

        <strong>Read Guide →</strong>
      </a>
    </div>

    <ng-template #noArticles>
      <div class="empty-box">
        <h2>No guides found</h2>
        <p>This category does not have articles yet.</p>
        <a routerLink="/">Go to Home</a>
      </div>
    </ng-template>

  </div>
</section>
